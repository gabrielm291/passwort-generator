<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moderner Passwort Generator</title>
<link rel="icon" href="Schlüssel.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }

  .container {
    background: #1e1e2f;
    padding: 30px 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  h1 {
    margin-bottom: 20px;
    font-weight: 600;
  }

  input[type="number"], input[type="text"], button {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    font-size: 16px;
  }

  input[type="number"], input[type="text"] {
    border: 1px solid #555;
    background: #2a2a3d;
    color: #fff;
  }

  button {
    background-color: #4caf50;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background-color: #45a049;
  }

  .options {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    margin: 10px 0;
  }

  .options label {
    margin: 5px 0;
  }

  /* Passwortstärke-Balken */
  .strength-container {
    width: 100%;
    height: 12px;
    background: #555;
    border-radius: 6px;
    margin-top: 10px;
    overflow: hidden;
  }

  .strength-bar {
    height: 100%;
    width: 0%;
    background: limegreen;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Passwort Generator</h1>

  <label for="length">Länge:</label>
  <input type="number" id="length" value="12" min="4" max="64">

  <div class="options">
    <label><input type="checkbox" id="uppercase" checked> Großbuchstaben</label>
    <label><input type="checkbox" id="lowercase" checked> Kleinbuchstaben</label>
    <label><input type="checkbox" id="numbers" checked> Zahlen</label>
    <label><input type="checkbox" id="symbols" checked> Sonderzeichen</label>
  </div>

  <button onclick="generatePassword()">Passwort generieren</button>

  <input type="text" id="password" placeholder="Hier erscheint dein Passwort" oninput="updateStrength(this.value)">

  <button onclick="copyPassword()">Kopieren</button>

  <!-- Passwortstärke Balken -->
  <div class="strength-container">
    <div class="strength-bar" id="strengthBar"></div>
  </div>
</div>

<script>
function generatePassword() {
    const length = parseInt(document.getElementById('length').value);
    const useUpper = document.getElementById('uppercase').checked;
    const useLower = document.getElementById('lowercase').checked;
    const useNumbers = document.getElementById('numbers').checked;
    const useSymbols = document.getElementById('symbols').checked;

    let charset = '';
    if(useUpper) charset += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if(useLower) charset += 'abcdefghijklmnopqrstuvwxyz';
    if(useNumbers) charset += '0123456789';
    if(useSymbols) charset += '!@#$%^&*()-_=+[]{};:,.<>?';

    if(!charset) {
        alert("Bitte mindestens eine Option auswählen!");
        return;
    }

    let password = '';
    for(let i = 0; i < length; i++) {
        password += charset.charAt(Math.floor(Math.random() * charset.length));
    }

    const passwordField = document.getElementById('password');
    passwordField.value = password;

    updateStrength(password);
}

function updateStrength(password) {
    let strength = 0;

    if(/[A-Z]/.test(password)) strength += 1;
    if(/[a-z]/.test(password)) strength += 1;
    if(/[0-9]/.test(password)) strength += 1;
    if(/[^A-Za-z0-9]/.test(password)) strength += 1;
    strength += password.length / 16;

    const bar = document.getElementById('strengthBar');
    let width = Math.min(strength * 25, 100);
    bar.style.width = width + '%';

    if(width < 40) bar.style.background = 'red';
    else if(width < 70) bar.style.background = 'orange';
    else bar.style.background = 'limegreen';
}

function copyPassword() {
    const passwordField = document.getElementById('password');
    passwordField.select();
    passwordField.setSelectionRange(0, 99999);
    document.execCommand("copy");
    alert("Passwort kopiert: " + passwordField.value);
}
</script>

</body>
</html>
